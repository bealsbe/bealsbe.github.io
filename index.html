<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Beals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ref.css">
  </head>
  <body>
    <nav class="site-nav">
      <a href="/" class="nav-link active">Home</a>
      <a href="/ref/" class="nav-link">Character Ref</a>
    </nav>

    <main>
      <div class="profile-card">
        <div class="profile-header">
          <div class="avatar-link">
            <picture>
              <source srcset="img/icon.webp" type="image/webp">
              <img src="img/icon.png" alt="Beals" class="avatar">
            </picture>
          </div>
          <div class="profile-text">
            <h1 class="name">Beals</h1>
            <p class="bio">Hello there, I'm Beals! Currently residing in the beautiful state of Oregon. Life to me is an adventure and too short not to be yourself</p>
          </div>
        </div>
        <div class="divider"></div>
        <div class="links">
          <a id="discord-btn" class="link-btn" style="--btn-bg: #5865F2; cursor: pointer;">
            <img src="img/discord.png" alt="" class="icon">
            <span class="label">Discord</span>
            <span class="spacer"></span>
          </a>
          <a rel="me" href="https://bsky.app/profile/beals.gay" class="link-btn" style="--btn-bg: #1185fe;">
            <img src="img/Bluesky_Logo.png" alt="" class="icon">
            <span class="label">Bluesky</span>
            <span class="spacer"></span>
          </a>
          <a href="https://t.me/Beals" class="link-btn" style="--btn-bg: #0088cc;">
            <img src="img/telegram.png" alt="" class="icon">
            <span class="label">Telegram</span>
            <span class="spacer"></span>
          </a>
          <a href="https://steamcommunity.com/id/bealsabub" class="link-btn" style="--btn-bg: #1b2838;">
            <img src="img/steam.png" alt="" class="icon">
            <span class="label">Steam</span>
            <span class="spacer"></span>
          </a>
          <a href="https://vrchat.com/home/user/usr_a2014a83-892b-4fdf-8396-775e1e39d531" class="link-btn" style="--btn-bg: #4a4f5c;">
            <img src="img/vr_chat.png" alt="" class="icon">
            <span class="label">VRChat</span>
            <span class="spacer"></span>
          </a>
          <a href="https://github.com/bealsbe" class="link-btn" style="--btn-bg: #f0f0f0; --btn-color: #111;">
            <img src="img/github.png" alt="" class="icon">
            <span class="label">GitHub</span>
            <span class="spacer"></span>
          </a>
          <a href="https://sfw.furaffinity.net/user/beals/" class="link-btn" style="--btn-bg: #FAAF3A;">
            <img src="img/fa.png" alt="" class="icon">
            <span class="label">Fur Affinity</span>
            <span class="spacer"></span>
          </a>
          <a href="https://www.furtrack.com/index/photographer:beals" class="link-btn" style="--btn-bg: #2c0e4c;">
            <img src="img/furtrack.png" alt="" class="icon" style="transform: scale(1.3);">
            <span class="label">FurTrack</span>
            <span class="spacer"></span>
          </a>
        </div>
      </div>
    </main>

    <canvas></canvas>

    <div class="images">
      <picture><source srcset="img/merp1.webp" type="image/webp"><img id="img-merp1" src="img/merp1.png"></picture>
      <picture><source srcset="img/merp2.webp" type="image/webp"><img id="img-merp2" src="img/merp2.png"></picture>
      <picture><source srcset="img/bealsonwheels.webp" type="image/webp"><img id="img-bealsonwheels" src="img/bealsonwheels.png"></picture>
    </div>

    <script src="js/index.js" defer></script>
    <script src="js/transitions.js" defer></script>
  </body>
</html>
